name: cursor-bridge patch verify

# Verifies, on a clean tree, that the Cursor Cursor Composer Client-Tools sidecar installs and the @cursor/sdk patch
# applies correctly (AST seams + exact version/hashes + descriptor). Catches SDK drift before release.
on:
  push:
    paths:
      - "sidecars/cursor-bridge/**"
      - ".github/workflows/cursor-bridge-patch.yml"
  pull_request:
    paths:
      - "sidecars/cursor-bridge/**"

jobs:
  patch-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecars/cursor-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install build tools for native sqlite3
        run: sudo apt-get update && sudo apt-get install -y python3 make g++
      - name: npm ci (runs the postinstall patcher)
        run: npm ci
      - name: Unit tests (npm test)
        run: npm test
      - name: Verify the installed SDK against the structural patch descriptor
        run: |
          node -e '
            const patcher = require("./scripts/apply-clienttools-patch.cjs");
            const path = require("path");
            const fs = require("fs");
            const root = path.join(process.cwd(), "node_modules", "@cursor", "sdk");
            const descriptor = JSON.parse(fs.readFileSync(path.join(root, patcher.DESCRIPTOR_REL), "utf8"));
            const version = JSON.parse(fs.readFileSync(path.join(root, "package.json"), "utf8")).version;
            patcher.validateDescriptor({
              descriptor,
              version,
              bundleSource: fs.readFileSync(path.join(root, patcher.BUNDLE_REL), "latin1"),
              indexSource: fs.readFileSync(path.join(root, patcher.INDEX_REL), "latin1"),
            });
            console.log("structural patch descriptor verified", descriptor);
          '
      - name: Run bridge fail-closed self-tests against the patched bundle
        run: npm run selftest
      - name: node --check patched bundle + bridge + patcher
        run: |
          node --check node_modules/@cursor/sdk/dist/cjs/index.js
          node --check node_modules/@cursor/sdk/dist/cjs/973.js
          node --check cursor-agent-bridge.mjs
          node -c scripts/apply-clienttools-patch.cjs
      - name: Idempotency (re-run patcher is a no-op)
        run: node scripts/apply-clienttools-patch.cjs
