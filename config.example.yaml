# Amp Integration
# ampcode:
#   # Configure upstream URL for Amp CLI OAuth and management features
#   upstream-url: "https://ampcode.com"
#   # Optional: Override API key for Amp upstream (otherwise uses env or file)
#   upstream-api-key: ""
#   # Per-client upstream API key mapping
#   # Maps client API keys (from top-level api-keys) to different Amp upstream API keys.
#   # Useful when different clients need to use different Amp accounts/quotas.
#   # If a client key isn't mapped, falls back to upstream-api-key (default behavior).
#   upstream-api-keys:
#     - upstream-api-key: "amp_key_for_team_a"    # Upstream key to use for these clients
#       api-keys:                                 # Client keys that use this upstream key
#         - "your-api-key-1"
#         - "your-api-key-2"
#     - upstream-api-key: "amp_key_for_team_b"
#       api-keys:
#         - "your-api-key-3"
#   # Restrict Amp management routes (/api/auth, /api/user, etc.) to localhost only (default: false)
#   restrict-management-to-localhost: false
#   # Force model mappings to run before checking local API keys (default: false)
#   force-model-mappings: false
#   # Amp Model Mappings
#   # Route unavailable Amp models to alternative models available in your local proxy.
#   # Useful when Amp CLI requests models you don't have access to (e.g., Claude Opus 4.5)
#   # but you have a similar model available (e.g., Claude Sonnet 4).
#   model-mappings:
#     - from: "claude-opus-4-5-20251101"          # Model requested by Amp CLI
#       to: "gemini-claude-opus-4-5-thinking"     # Route to this available model instead
#     - from: "claude-sonnet-4-5-20250929"
#       to: "gemini-claude-sonnet-4-5-thinking"
#     - from: "claude-haiku-4-5-20251001"
#       to: "gemini-2.5-flash"

# Chutes configuration (optional; OpenAI-compatible upstream).
# Route explicitly via `model: "chutes-<model>"` or expose non-prefixed IDs depending on priority.
#chutes:
#  api-key: ""                # required to enable Chutes
#  base-url: "https://llm.chutes.ai/v1"
#  models: []                 # optional allowlist (model roots)
#  models-exclude: []         # optional denylist (model roots)
#  priority: "fallback"       # fallback (default) or primary
#  tee-preference: "prefer"   # prefer (default), avoid, or both
#  proxy-url: ""              # per-auth proxy override
#  max-retries: 4             # retry intermittent 429s; set to 0 to disable
#  retry-backoff: "5,15,30,60" # comma-separated seconds for each retry (default: 5s, 15s, 30s, 60s)

# Global OAuth model name aliases (per channel)
# These aliases rename model IDs for both model listing and request routing.
# Supported channels: vertex, aistudio, antigravity, claude, codex, kimi, xai.
# NOTE: Aliases do not apply to gemini-api-key, codex-api-key, claude-api-key, openai-compatibility, or vertex-api-key.
# NOTE: Because aliases affect the merged /v1 model list and merged request routing, overlapping
# client-visible names can become ambiguous across providers. For strict backend pinning, use
# unique aliases/prefixes or avoid overlapping names.
# You can repeat the same name with different aliases to expose multiple client model names.
# Per-auth OAuth aliases can also be stored in an OAuth auth JSON file as "model-aliases".
# They apply only to that selected auth and take precedence over global aliases for the same client-visible alias.
# Example auth JSON:
# {
#   "type": "codex",
#   "email": "user@example.com",
#   "model-aliases": [
#     {"name": "gpt-5.3-codex-spark", "alias": "gpt-5.5"},
#     {"name": "gpt-5.3-codex-spark", "alias": "gpt-5.4"}
#   ]
# }
# oauth-model-alias:
#   vertex:
#     - name: "gemini-2.5-pro"
#       alias: "g2.5p"
#   aistudio:
#     - name: "gemini-2.5-pro"
#       alias: "g2.5p"
#   antigravity:
#     - name: "gemini-3-pro-high"
#       alias: "gemini-3-pro-preview"
#   claude:
#     - name: "claude-sonnet-4-5-20250929"
#       alias: "cs4.5"
#   codex:
#     - name: "gpt-5"
#       alias: "g5"
#   kimi:
#     - name: "kimi-k2.5"
#       alias: "k2.5"
#   xai:
#     - name: "grok-4.3"
#       alias: "grok-latest"
#   sample-provider:                  # plugin provider keys are supported for OAuth plugins
#     - name: "sample-model-latest"
#       alias: "sample-latest"

# OAuth deterministic proxy pool (per provider)
# Values are CSV proxy URLs. Assignment is deterministic using auth identity hash,
# so each OAuth account sticks to one proxy unless pool/provider/account changes.
# oauth-proxy-pool:
#   copilot: "http://proxy-a:8080,http://proxy-b:8080,socks5://proxy-c:1080"
#   codex: "http://proxy-x:8080,http://proxy-y:8080"
#
# OAuth provider excluded models
# oauth-excluded-models:
#   vertex:
#     - "gemini-3-pro-preview"
#   aistudio:
#     - "gemini-3-pro-preview"
#   antigravity:
#     - "gemini-3-pro-preview"
#   claude:
#     - "claude-3-5-haiku-20241022"
#   codex:
#     - "gpt-5-codex-mini"
#   kimi:
#     - "kimi-k2-thinking"
#   xai:
#     - "grok-3-mini"

# Optional payload configuration
# payload:

# Passthru model routes
#
# Use this to declare local model IDs that should be forwarded to an external API.
# This generalizes to multiple upstream API styles by choosing the protocol.
#
# Supported protocols:
#   - openai: OpenAI-compatible Chat Completions (/chat/completions)
#   - claude: Anthropic Messages API (/v1/messages)
#   - codex:  OpenAI Responses API (/responses)
#
# Notes:
# - model is what your client sends to CLIProxyAPI.
# - base-url is the upstream base URL (without the endpoint path).
# - api-key is optional if you provide auth via headers instead.
# - upstream-model overrides the upstream "model" field.
# - headers are merged into the upstream request; prefer this for non-Bearer auth schemes.
#
# passthru:
#   - model: "glm-4.7"
#     protocol: "openai"
#     base-url: "https://api.z.ai/v1"
#     api-key: "za-..."
#     # api-keys support multiple API keys for fallback (when one is rate-limited or fails)
#     # If api-key is also provided, it is treated as the first key in the fallback list
#     # api-keys:
#     #   - "za-..."
#     #   - "za-backup-..."
#     upstream-model: "glm-4.7"
#     headers:
#       X-Custom-Header: "custom-value"
#     # Route-scoped payload rules are expanded into the shared payload rule engine.
#     # Use override for provider-required fields, default for optional fallbacks, and
#     # filter for request fields the upstream ignores or rejects.
#     payload:
#       override:
#         "thinking.type": "enabled"
#         "reasoning_effort": "high"
#       filter:
#         - "temperature"
#         - "top_p"
#     # Preserve assistant reasoning_content across tool-call turns for clients
#     # that drop it. Required by some thinking upstreams such as DeepSeek v4.
#     preserve-reasoning-content: true
#     # Lenient mode: disable automatic model/provider suspension on upstream errors.
#     # This is useful for routes where the upstream may legitimately reject specific
#     # requests (e.g., unsupported input formats like images for text-only models)
#     # but the model remains available for other requests.
#     lenient: true
#     # Alternatively, use explicit rate-limit settings for more granular control:
#     # rate-limit:
#     #   request-retry: 3
#     #   disable-cooling: false
#     #   disable-model-suspend: true   # Don't suspend model on 401/402/403/404/429
#     #   disable-provider-suspend: true # Don't cascade errors to provider level
#
# Railway-friendly env var (supports both api-key and api-keys):
#   PASSTHRU_MODELS_JSON='[{"model":"glm-4.7","protocol":"openai","base-url":"https://api.z.ai/v1","api-key":"za-...","upstream-model":"glm-4.7","proxy-url":"socks5://proxy.example.com:1080","headers":{"X-Custom-Header":"custom-value"}}]'
# For multiple API keys (fallback support):
#   PASSTHRU_MODELS_JSON='[{"model":"glm-4.7","protocol":"openai","base-url":"https://api.z.ai/v1","api-keys":["za-primary","za-backup"],"upstream-model":"glm-4.7"}]'
# For route-scoped payload params (for example, DeepSeek thinking aliases):
#   PASSTHRU_MODELS_JSON='[{"model":"deepseek-v4-pro-xhigh","protocol":"openai","base-url":"https://api.deepseek.com","api-key":"sk-...","upstream-model":"deepseek-v4-pro","preserve-reasoning-content":true,"payload":{"override":{"thinking.type":"enabled","reasoning_effort":"xhigh"},"filter":["temperature","top_p","presence_penalty","frequency_penalty"]}}]'
#
#   default: # Default rules only set parameters when they are missing in the payload.
#     - models:
#         - name: "gemini-2.5-pro" # Supports wildcards (e.g., "gemini-*")
#           protocol: "gemini" # restricts the rule to a specific protocol, options: openai, gemini, claude, codex, antigravity
#           from-protocol: "responses" # restricts the rule to the source protocol, options: openai, responses, gemini, claude
#           headers: # all configured request headers must match; values support "*" wildcards
#             X-Client-Tier: "tenant-*-region-*"
#           match: # all payload JSON paths must equal the configured values
#             - "metadata.client": "codex"
#           not-match: # payload JSON paths must not equal the configured values
#             - "metadata.mode": "dev"
#           exist: # all payload JSON paths must exist and not be null
#             - "tools.#(type==\"web_search\").type"
#           not-exist: # all payload JSON paths must be missing or null
#             - "metadata.disable_payload"
#       params: # JSON path (gjson/sjson syntax) -> value
#         "generationConfig.thinkingConfig.thinkingBudget": 32768
#   default-raw: # Default raw rules set parameters using raw JSON when missing (must be valid JSON).
#     - models:
#         - name: "gemini-2.5-pro" # Supports wildcards (e.g., "gemini-*")
#           protocol: "gemini" # restricts the rule to a specific protocol, options: openai, gemini, claude, codex, antigravity
#       params: # JSON path (gjson/sjson syntax) -> raw JSON value (strings are used as-is, must be valid JSON)
#         "generationConfig.responseJsonSchema": "{\"type\":\"object\",\"properties\":{\"answer\":{\"type\":\"string\"}}}"
#   override: # Override rules always set parameters, overwriting any existing values.
#     - models:
#         - name: "gpt-*" # Supports wildcards (e.g., "gpt-*")
#           protocol: "codex" # restricts the rule to a specific protocol, options: openai, gemini, claude, codex, antigravity
#       params: # JSON path (gjson/sjson syntax) -> value
#         "reasoning.effort": "high"
#   override-raw: # Override raw rules always set parameters using raw JSON (must be valid JSON).
#     - models:
#         - name: "gpt-*" # Supports wildcards (e.g., "gpt-*")
#           protocol: "codex" # restricts the rule to a specific protocol, options: openai, gemini, claude, codex, antigravity
#       params: # JSON path (gjson/sjson syntax) -> raw JSON value (strings are used as-is, must be valid JSON)
#         "response_format": "{\"type\":\"json_schema\",\"json_schema\":{\"name\":\"answer\",\"schema\":{\"type\":\"object\"}}}"
#   filter: # Filter rules remove specified parameters from the payload.
#     - models:
#         - name: "gemini-2.5-pro" # Supports wildcards (e.g., "gemini-*")
#           protocol: "gemini" # restricts the rule to a specific protocol, options: openai, gemini, claude, codex, antigravity
#       params: # JSON paths (gjson/sjson syntax) to remove from the payload
