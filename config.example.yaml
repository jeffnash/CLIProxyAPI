# Cursor Composer API key configuration.
# Get your API key from cursor.com Settings > Integrations.
# The key starts with "crsr_" and provides access to Composer 2.5 and other models.
#cursor-api-key:
#  - api-key: "crsr_..."          # your Cursor user API key (required)
#    prefix: ""                    # optional: namespace models (e.g., "cursor/composer-2.5")
#    proxy-url: ""                 # optional: per-account proxy override
#    composer-client-tools-bridge-url: ""         # optional: override the Cursor Composer Client-Tools agent bridge (default http://127.0.0.1:9798)
#    composer-client-tools-bridge-token: ""       # optional (multi-tenant): bridge auth token sent as X-Bridge-Auth, so
#                                  # several Cursor keys can share ONE bridge (each isolated to its own SDK
#                                  # platform + stateRoot). The SAME token MUST be set on BOTH sides — here
#                                  # (or env CURSOR_AGENT_BRIDGE_TOKEN on the CLIProxy process) AND
#                                  # CURSOR_AGENT_BRIDGE_TOKEN on the bridge process; a mismatch/omission is
#                                  # a 401 on every request. Leave empty for the usual one-key-per-bridge setup.
#    tool-aliases: {}              # optional: override how Cursor-emitted/generic tool names map to THIS
#                                  # client's tools, e.g. {shell: RunCommand, read: OpenFile}. Wins over the
#                                  # built-in table. Global default via env CURSOR_TOOL_ALIASES (JSON or
#                                  # "from=to,from=to"); the per-key value wins on conflict.
#    headers: {}                   # optional: extra HTTP headers
#    models: []                    # optional: model name/alias overrides
#    excluded-models: []           # optional: model IDs to exclude
# DEFAULT (recommended): Cursor Composer Client-Tools — Cursor requests go to the cursor-agent-bridge.mjs sidecar (port 9798),
# where the official @cursor/sdk owns ALL Cursor API I/O and every tool executes on YOUR client (Claude
# Code, etc.). The proxy never calls Cursor's API directly. Start the bridge via scripts/railway_start.sh
# or the Docker image; install with `cd sidecars/cursor-bridge && npm ci` (runs the SDK patcher).
# FALLBACK (advanced, ToS-exposed): set env CURSOR_DIRECT=1 to use the direct AgentService path
# (internal/runtime/executor/cursor_agent.go), which forges IDE/CLI identity headers against Cursor's
# internal endpoints. It opts OUT of the Cursor Composer Client-Tools posture; a loud startup warning is logged.

# Default headers for Codex OAuth model requests.
# These are used only for file-backed/OAuth Codex requests when the client
# does not send the header. `user-agent` applies to HTTP and websocket requests;
# `beta-features` only applies to websocket requests. They do not apply to codex-api-key entries.
# codex-header-defaults:
#   user-agent: "codex_cli_rs/0.114.0 (Mac OS 14.2.0; x86_64) vscode/1.111.0"
#   beta-features: "multi_agent"

# OpenAI compatibility providers
# openai-compatibility:
#   - name: "openrouter" # The name of the provider; it will be used in the user agent and other places.
#     disabled: false # optional: set to true to disable this provider without removing it
#     prefix: "test" # optional: require calls like "test/kimi-k2" to target this provider's credentials
#     base-url: "https://openrouter.ai/api/v1" # The base URL of the provider.
#     disable-cooling: false # optional: per-provider override for auth/model cooldown scheduling
#     headers:
#       X-Custom-Header: "custom-value"
#     api-key-entries:
#       - api-key: "sk-or-v1-...b780"
#         proxy-url: "socks5://proxy.example.com:1080" # optional: per-key proxy override
#         # proxy-url: "direct" # optional: explicit direct connect for this credential
#       - api-key: "sk-or-v1-...b781" # without proxy-url
#     models: # The models supported by the provider.
#       - name: "moonshotai/kimi-k2:free" # The actual model name.
#         alias: "kimi-k2"               # The alias used in the API.
#         image: false                   # optional: set true to allow this model on /v1/images/generations and /v1/images/edits
#         thinking:                      # optional: omit to default to levels ["low","medium","high"]
#           levels: ["low", "medium", "high"]
#       # You may repeat the same alias to build an internal model pool.
#       # The client still sees only one alias in the model list.
#       # Requests to that alias will round-robin across the upstream names below,
#       # and if the chosen upstream fails before producing output, the request will
